<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Ace Pro - YOUR777</title>
    <style>
        body { background: #011d13; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .header { background: #f1c40f; color: #000; padding: 15px; font-weight: bold; font-size: 20px; }
        
        .multiplier-bar { display: flex; justify-content: space-around; background: #003321; padding: 10px; margin: 10px; border-radius: 5px; border: 1px solid #f1c40f; }
        .mult { opacity: 0.3; font-weight: bold; }
        .mult.active { opacity: 1; color: #f1c40f; transform: scale(1.2); }

        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; max-width: 300px; margin: auto; }
        .card { 
            height: 100px; background: white; color: black; font-size: 40px; 
            line-height: 100px; border-radius: 10px; border: 3px solid #f1c40f; 
            font-weight: bold; transition: transform 0.2s; 
        }
        
        /* ঘোরার অ্যানিমেশন */
        .spinning { animation: flip 0.1s infinite; }
        @keyframes flip {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(180deg); }
        }

        .controls { position: fixed; bottom: 0; width: 100%; background: #00261a; padding: 20px; box-sizing: border-box; }
        .spin-btn { width: 100%; padding: 15px; background: #f1c40f; border: none; border-radius: 50px; font-size: 20px; font-weight: bold; color: #000; box-shadow: 0 4px #b8860b; }
        .spin-btn:active { transform: translateY(2px); box-shadow: 0 2px #b8860b; }
    </style>
</head>
<body>

    <div class="header">SUPER ACE PRO</div>

    <div class="multiplier-bar">
        <span class="mult" id="m1">x1</span>
        <span class="mult" id="m2">x2</span>
        <span class="mult" id="m3">x3</span>
        <span class="mult" id="m5">x5</span>
    </div>

    <div style="margin: 10px;">Balance: ৳<span id="bal">0.00</span></div>

    <div class="card-grid">
        <div class="card" id="c1">A</div>
        <div class="card" id="c2">K</div>
        <div class="card" id="c3">Q</div>
    </div>

    <div id="msg" style="color: #f1c40f; font-weight: bold; margin-top: 10px; height: 20px;"></div>

    <div class="controls">
        <p style="font-size: 12px; margin-bottom: 5px;">COST: ৳2 | MAX WIN: ৳20</p>
        <button class="spin-btn" id="sBtn" onclick="play()">SPIN</button>
    </div>

    <script>
        const symbols = ['A', 'K', 'Q', 'J', '10'];
        let balance = parseFloat(localStorage.getItem('userBalance')) || 0;

        function up() {
            document.getElementById('bal').innerText = balance.toFixed(2);
            localStorage.setItem('userBalance', balance.toFixed(2));
        }
        up();

        function play() {
            if (balance < 2) { alert("ব্যালেন্স নেই!"); return; }
            balance -= 2; up();

            document.getElementById('sBtn').disabled = true;
            document.getElementById('msg').innerText = "SPINNING...";
            
            // কার্ডে অ্যানিমেশন যোগ করা
            document.getElementById('c1').classList.add('spinning');
            document.getElementById('c2').classList.add('spinning');
            document.getElementById('c3').classList.add('spinning');

            setTimeout(() => {
                document.getElementById('c1').classList.remove('spinning');
                document.getElementById('c2').classList.remove('spinning');
                document.getElementById('c3').classList.remove('spinning');
                
                // হারানো জেতানোর কন্ট্রোল (৮৫% হারবে)
                let win = Math.random() < 0.15; 
                let r1, r2, r3;

                if (win) {
                    r1 = r2 = r3 = symbols[Math.floor(Math.random()*symbols.length)];
                    balance += 10;
                    document.getElementById('msg').innerText = "WINNER! +৳10";
                    document.getElementById('m5').classList.add('active');
                } else {
                    r1 = symbols[0]; r2 = symbols[1]; r3 = symbols[2];
                    document.getElementById('msg').innerText = "TRY AGAIN";
                    document.getElementById('m1').classList.add('active');
                    setTimeout(()=> document.querySelectorAll('.mult').forEach(m => m.classList.remove('active')), 1000);
                }

                document.getElementById('c1').innerText = r1;
                document.getElementById('c2').innerText = r2;
                document.getElementById('c3').innerText = r3;
                document.getElementById('sBtn').disabled = false;
                up();
            }, 1500);
        }
    </script>
</body>
</html>
