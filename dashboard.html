<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUR777 - Login</title>
    <style>
        body { 
            background-color: #011d13; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        .login-box { 
            background: #00261a; 
            border: 2px solid #00c389; 
            padding: 40px 30px; 
            border-radius: 20px; 
            width: 90%; 
            max-width: 350px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
        }
        .logo { 
            color: #FFD700; 
            font-size: 35px; 
            font-weight: bold; 
            margin-bottom: 10px; 
            text-shadow: 2px 2px #000;
        }
        p { color: #ccc; margin-bottom: 25px; font-size: 14px; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border-radius: 10px; 
            border: 1px solid #00c389; 
            background: #011d13; 
            color: white; 
            box-sizing: border-box; 
            outline: none; 
        }
        .btn { 
            width: 100%; 
            padding: 15px; 
            background: #FFD700; 
            border: none; 
            border-radius: 50px; 
            font-size: 18px; 
            font-weight: bold; 
            color: black; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .btn:hover { background: #e6c200; transform: scale(1.02); }
        .footer-links { margin-top: 20px; font-size: 13px; }
        a { color: #FFD700; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo">YOUR777</div>
        <p>Login to your account</p>
        
        <input type="text" id="phone" placeholder="Phone number">
        <input type="password" id="pass" placeholder="Password">
        
        <button class="btn" onclick="checkLogin()">Login</button>
        
        <div class="footer-links">
            No account? <a href="register.html">Register Now</a>
        </div>
    </div>

    <script>
        function checkLogin() {
            var phone = document.getElementById('phone').value;
            var pass = document.getElementById('pass').value;

            if (phone === "" || pass === "") {
                alert("দয়া করে ফোন নম্বর এবং পাসওয়ার্ড দিন!");
            } else {
                // নিশ্চিত করুন আপনার ফাইলের নাম dashboard.html ই আছে
                window.location.href = "dashboard.html";
            }
        }
    </script>

</body>
</html>
