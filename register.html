<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - YOUR777</title>
    <style>
        body { background-color: #011d13; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .reg-box { background: #00261a; border: 2px solid #00c389; padding: 30px; border-radius: 20px; width: 320px; text-align: center; }
        .logo { color: #FFD700; font-size: 30px; font-weight: bold; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #444; background: #011d13; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #FFD700; border: none; border-radius: 10px; font-weight: bold; color: black; cursor: pointer; }
        .login-link { margin-top: 15px; font-size: 14px; }
        a { color: #FFD700; text-decoration: none; }
    </style>
</head>
<body>
    <div class="reg-box">
        <div class="logo">YOUR777</div>
        <p>Create a new account</p>
        <input type="text" placeholder="Full Name">
        <input type="text" placeholder="Phone Number">
        <input type="password" placeholder="Set Password">
        <button class="btn" onclick="alert('Registration Successful!'); location.href='index.html'">Register Now</button>
        <div class="login-link">
            Already have an account? <a href="index.html">Login here</a>
        </div>
    </div>
</body>
</html>
