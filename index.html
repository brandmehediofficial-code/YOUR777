<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUR777 - Login</title>
    <style>
        body { background: #011d13; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: #00261a; border: 2px solid #00c389; padding: 30px; border-radius: 20px; width: 320px; text-align: center; box-shadow: 0 0 20px rgba(0,195,137,0.2); }
        h1 { color: #FFD700; font-size: 35px; margin-bottom: 10px; font-weight: bold; }
        p { color: #aaa; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #444; background: #011d13; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #FFD700; border: none; border-radius: 10px; font-weight: bold; color: black; cursor: pointer; font-size: 16px; }
        .reg-link { margin-top: 15px; font-size: 14px; }
        a { color: #FFD700; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>YOUR777</h1>
        <p>Login to your account</p>
        <input type="text" placeholder="Phone number">
        <input type="password" placeholder="Password">
        <button class="btn" onclick="location.href='dashboard.html'">Login</button>
        <div class="reg-link">
            No account? <a href="register.html">Register Now</a>
        </div>
    </div>
</body>
</html>
