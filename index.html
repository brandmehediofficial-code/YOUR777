<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUR777 - Login</title>
    <style>
        body { background: #011d13; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: #00261a; border: 1px solid #00c389; }
h1 { color: #FFD700; font-size: 35px; }

        a { color: #FFD700; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>YOUR777</h1>
        <p>Login to your account</p>

        <button class="btn" onclick="window.location.href='dashboard.html'">Login</button>

        <div class="reg-link">
            No account? <a href="register.html">Register Now</a>
        </div>
    </div>

</html>
